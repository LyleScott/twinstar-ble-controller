name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same PR/branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (3.10, what pyproject.toml requires) and current latest.
        # Catches version-specific issues without burning the matrix.
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev deps
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mdformat --check
        # Only check files tracked by git; auto-excludes .venv, caches, etc.
        run: git ls-files '*.md' | xargs mdformat --check

      - name: pytest
        run: pytest -q
